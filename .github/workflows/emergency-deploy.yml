name: Emergency Deploy to VPS

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type DEPLOY to confirm"
        required: true
      release_reason:
        description: "Release reason"
        required: false
        default: "Emergency deploy (Actions quota bypass)"

jobs:
  deploy:
    if: github.event.inputs.confirm == 'DEPLOY'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Disk cleanup and diagnostic
        uses: appleboy/ssh-action@v1
        continue-on-error: true
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 5m
          script: |
            echo "=== disk ==="
            df -h / | tail -1

            echo "=== cleaning docker (preserve volumes!) ==="
            docker system prune -af 2>/dev/null | tail -3 || true
            docker builder prune -af 2>/dev/null | tail -3 || true
            rm -f /tmp/stit-main.tar.gz 2>/dev/null || true

            echo "=== disk after cleanup ==="
            df -h / | tail -1

            echo "=== docker ps ==="
            docker ps -a --format 'table {{.Names}}\t{{.Status}}\t{{.Image}}' | head -20

            echo "=== docker volumes ==="
            docker volume ls

            echo "=== backup files on VPS ==="
            ls -lh /tmp/stit_pg15_dump* /opt/stit/backups/* /root/*.sql 2>/dev/null || echo "no backups found"
            find /opt /tmp /root -name "*pg*dump*" -o -name "*backup*sql*" 2>/dev/null | head -10

            echo "=== db roles ==="
            docker exec stit-db-1 psql -U stit -d stit -c "\\du" 2>&1 || echo "stit role failed too"

            echo "=== db tables (as stit user) ==="
            docker exec stit-db-1 psql -U stit -d stit -c "SELECT count(*) as table_count FROM information_schema.tables WHERE table_schema='public';" 2>&1 || echo "DB check failed"
            docker exec stit-db-1 psql -U stit -d stit -c "SELECT tablename FROM pg_tables WHERE schemaname='public' ORDER BY tablename LIMIT 20;" 2>&1 || echo "Table list failed"

            echo "=== git HEAD ==="
            cd /opt/stit && git log -1 --oneline

      - name: Download repo tarball via API
        env:
          DEPLOY_TOKEN: ${{ secrets.GH_DEPLOY_TOKEN }}
        run: |
          set -euo pipefail
          curl -sL \
            -H "Authorization: token $DEPLOY_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/creatigo-of-china/stit-production/tarball/main" \
            -o /tmp/stit-main.tar.gz
          ls -lh /tmp/stit-main.tar.gz
          # Verify it's a valid tarball
          file /tmp/stit-main.tar.gz

      - name: Upload tarball to VPS and deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 30m
          script: |
            echo "Waiting for tarball upload..."

      - name: SCP tarball to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          install -m 600 /dev/null /tmp/vps_key
          printf '%s\n' "$VPS_SSH_KEY" > /tmp/vps_key
          mkdir -p ~/.ssh
          ssh-keyscan -p "$VPS_PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          scp -i /tmp/vps_key -P "$VPS_PORT" \
            /tmp/stit-main.tar.gz \
            "$VPS_USER@$VPS_HOST:/tmp/stit-main.tar.gz"
          rm -f /tmp/vps_key
          echo "Tarball uploaded"

      - name: Extract and deploy on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 30m
          script: |
            set -eo pipefail
            cd /opt/stit

            # Preserve .env, .git, and state dirs
            echo "Extracting tarball over repo..."
            FIRST_ENTRY=$(tar tzf /tmp/stit-main.tar.gz 2>/dev/null | head -1 || true)
            STRIP_COMPONENTS=$(echo "$FIRST_ENTRY" | tr -cd '/' | wc -c)
            echo "Strip components: $STRIP_COMPONENTS (from: $FIRST_ENTRY)"
            tar xzf /tmp/stit-main.tar.gz --strip-components=$STRIP_COMPONENTS \
              --exclude='.env' \
              --exclude='.git' \
              -C /opt/stit/
            rm -f /tmp/stit-main.tar.gz

            echo "Files updated."

            # Drop all tables and enable extensions for fresh alembic upgrade
            cat > /opt/stit/prepare_fresh_db.py << 'PYEOF'
            import asyncio
            from sqlalchemy import text
            from sqlalchemy.ext.asyncio import create_async_engine
            from src.core.config import settings
            engine = create_async_engine(settings.DATABASE_URL)
            async def init():
                async with engine.begin() as conn:
                    await conn.execute(text("DROP SCHEMA public CASCADE"))
                    await conn.execute(text("CREATE SCHEMA public"))
                    await conn.execute(text("GRANT ALL ON SCHEMA public TO stit"))
                    print("Schema reset: all tables dropped")
                    await conn.execute(text("CREATE EXTENSION IF NOT EXISTS vector"))
                    await conn.execute(text("CREATE EXTENSION IF NOT EXISTS pg_trgm"))
                    print("Extensions enabled: vector, pg_trgm")
                await engine.dispose()
            asyncio.run(init())
            PYEOF

            # Patch vps-deploy.sh: reset schema + extensions, then full alembic upgrade
            sed -i '/alembic upgrade heads/c\run_compose run --rm --no-deps -v /opt/stit/prepare_fresh_db.py:/app/prepare_fresh_db.py "$BACKEND_SERVICE" python prepare_fresh_db.py && run_compose run --rm --no-deps "$BACKEND_SERVICE" alembic upgrade heads' scripts/vps-deploy.sh

            echo "Patched alembic line:"
            grep -n "prepare_fresh_db\|alembic" scripts/vps-deploy.sh || true

            # Run deploy — skip git sync since we already updated files
            export SKIP_GIT_SYNC=true
            export ALLOW_DIRTY_GIT_TREE=true
            export STRICT_RELEASE_RECORDS=false
            export WITH_BASE_BACKUP=false
            export REQUIRE_DB_PITR_DRILL=false
            export REQUIRE_OBJECT_RESTORE_DRILL=false

            set +e
            bash scripts/vps-deploy.sh
            VPS_EXIT=$?
            set -e

            if [ "$VPS_EXIT" -ne 0 ]; then
              echo "::error::vps-deploy.sh exited with $VPS_EXIT"
              exit "$VPS_EXIT"
            fi

      - name: Verify deployment
        run: |
          sleep 20
          echo "=== Site reachable ==="
          curl -sI https://stit.ai/ | head -10
          echo "=== Bundle hash ==="
          curl -s https://stit.ai/ | grep -oE 'index-[a-zA-Z0-9]+\.js' | head -1
          echo "=== API health ==="
          curl -sf https://stit.ai/api/v1/health || echo "health check failed"
          echo "=== Auth sanity (expect 401/422) ==="
          curl -s -o /dev/null -w "%{http_code}" -X POST https://stit.ai/api/v1/auth/login \
            -H 'Content-Type: application/json' \
            -d '{"email":"test@test.com","password":"testtest"}'
          echo ""
